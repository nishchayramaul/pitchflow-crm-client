<main class="dashboard-shell">
  <header class="dashboard-nav">
    <h1>Dashboard</h1>
    <div class="actions">
      <button
        class="link-pill"
        [title]="copied ? 'Copied!' : 'Copy link'"
        [disabled]="!profileUrl"
        (click)="copyLink()"
      >
        {{ profileUrl || 'No link yet' }}
      </button>
      <button class="signout-btn" type="button" (click)="signOut()">Sign out</button>
    </div>
  </header>

  <section class="dashboard-card">
    @if (loadError) {
      <p class="error">{{ loadError }}</p>
    } @else {
      <p class="label">Welcome</p>
      <h2>{{ displayName }}</h2>
      <p class="subtext">Your public creator link is ready to share in bio.</p>
      @if (copied) {
        <p class="success">Link copied to clipboard!</p>
      }
    }
  </section>
</main>
