<aside class="pf-sidebar">

  <!-- Logo + wordmark -->
  <div class="pf-sidebar__header">
    <div class="pf-sidebar__logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <rect x="2" y="2" width="20" height="20" rx="6" fill="var(--ink)"/>
        <path d="M8 7h5.5a3.5 3.5 0 0 1 0 7H10v3"
              stroke="var(--bg)" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <span class="pf-sidebar__wordmark">Pitchflow</span>
    </div>
  </div>

  <!-- Search -->
  <div class="pf-sidebar__search-wrap">
    <button class="pf-sidebar__search pf-btn pf-btn--ghost">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="7"/>
        <path d="m21 21-4.3-4.3"/>
      </svg>
      <span class="pf-sidebar__search-label">Search…</span>
      <kbd class="pf-sidebar__kbd">⌘K</kbd>
    </button>
  </div>

  <!-- Nav items -->
  <nav class="pf-sidebar__nav">
    <a routerLink="/dashboard" routerLinkActive="active" class="pf-sidebar__item">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.7"
           stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="9" rx="1.5"/>
        <rect x="14" y="3" width="7" height="5" rx="1.5"/>
        <rect x="14" y="12" width="7" height="9" rx="1.5"/>
        <rect x="3" y="16" width="7" height="5" rx="1.5"/>
      </svg>
      Dashboard
    </a>

    <a routerLink="/leads" routerLinkActive="active" class="pf-sidebar__item">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.7"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M16 7a4 4 0 1 1-8 0 4 4 0 0 1 8 0Z"/>
        <path d="M3 21a9 9 0 0 1 18 0"/>
      </svg>
      Leads
    </a>

    <a routerLink="/settings" routerLinkActive="active" class="pf-sidebar__item">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.7"
           stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68h.09A1.65 1.65 0 0 0 10.1 3.17V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9v.09a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/>
      </svg>
      Settings
    </a>
  </nav>

  <!-- Footer — user + sign out -->
  <div class="pf-sidebar__footer">
    <div class="pf-sidebar__user">
      <div class="pf-sidebar__avatar">{{ initial || 'U' }}</div>
      <div class="pf-sidebar__user-info">
        <div class="pf-sidebar__user-name">{{ displayName || 'Creator' }}</div>
        <div class="pf-sidebar__user-slug pf-mono">pitchflow.in/{{ slug || '…' }}</div>
      </div>
      <button class="pf-sidebar__signout pf-btn pf-btn--ghost pf-btn--icon"
              (click)="signOut()" title="Sign out">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>
        </svg>
      </button>
    </div>
  </div>

</aside>
