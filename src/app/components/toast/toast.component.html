<div class="toast-container" aria-live="polite" aria-atomic="false">
  <div
    *ngFor="let toast of toasts; trackBy: trackById"
    class="toast"
    [class]="'toast toast--' + toast.type"
    [class.toast--leaving]="toast.leaving"
    role="alert"
  >
    <!-- Icon -->
    <div class="toast-icon">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
        <path [attr.d]="iconPath(toast.type)"></path>
      </svg>
    </div>

    <!-- Content -->
    <div class="toast-content">
      <span class="toast-title" *ngIf="toast.title">{{ toast.title }}</span>
      <span class="toast-message">{{ toast.message }}</span>
    </div>

    <!-- Dismiss -->
    <button class="toast-close" (click)="dismiss(toast.id)" aria-label="Dismiss">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
      </svg>
    </button>

    <!-- Progress bar -->
    <div class="toast-progress" [style.animation-duration]="toast.duration + 'ms'"></div>
  </div>
</div>
